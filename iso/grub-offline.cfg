set timeout=5
set default=0

set color_normal=light-gray/black
set color_highlight=red/black
set menu_color_normal=light-gray/black
set menu_color_highlight=red/black
set gfxpayload=keep

menuentry "  OpenCode + Ollama  [OFFLINE]" --class opencode {
    linux /boot/vmlinuz rdinit=/init console=tty0 earlycon
    initrd /boot/initramfs
}

menuentry "  --- No internet required. No escape either. ---" {
    true
}
